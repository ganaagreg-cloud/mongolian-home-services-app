services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mongolia_secure_pass
      POSTGRES_DB: homeservices
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homeservices"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@homeservices/api", "dev"]
    environment:
      DATABASE_URL: postgresql://postgres:mongolia_secure_pass@db:5432/homeservices
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: http://localhost:4000
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      NODE_ENV: development
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/api/node_modules
      - /app/packages/shared/node_modules
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://postgres:mongolia_secure_pass@db:5432/homeservices
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/web/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/web/.next
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["pnpm", "--filter", "@homeservices/admin", "dev"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/admin/node_modules
      - /app/packages/admin/.next
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
