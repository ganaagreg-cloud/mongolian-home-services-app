services:
  - type: web
    name: homeservices-api
    runtime: docker
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: homeservices-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: homeservices-web
    runtime: docker
    dockerfilePath: packages/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    name: homeservices-admin
    runtime: docker
    dockerfilePath: packages/admin/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: homeservices-db
    plan: free
    databaseName: homeservices
    user: postgres
